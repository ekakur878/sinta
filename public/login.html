<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SINTA</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖥️</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">🖥️</div>
      <h1>SINTA</h1>
      <p>SISTEM INFORMASI PENCATATAN ASET</p>
    </div>
    <div class="login-body">
      <div class="login-hint">
        <strong>Akun Demo:</strong>
        <table>
          <tr>
            <td>Admin</td>
            <td>
              <button class="btn btn-sm btn-outline demo-login"
                data-user="admin" data-pass="admin123"
                style="padding:2px 8px;font-size:11px">
                admin / admin123
              </button>
            </td>
          </tr>
          <tr>
            <td>Pengguna</td>
            <td>
              <button class="btn btn-sm btn-outline demo-login"
                data-user="budi" data-pass="user123"
                style="padding:2px 8px;font-size:11px">
                budi / user123
              </button>
            </td>
          </tr>
        </table>
      </div>
      <form id="login-form">
        <div class="form-group" style="margin-bottom:14px">
          <label>Username</label>
          <input type="text" id="login-username" placeholder="Masukkan username"
            autocomplete="username" autofocus>
        </div>
        <div class="form-group" style="margin-bottom:16px">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Masukkan password"
            autocomplete="current-password">
        </div>
        <div id="login-error" class="alert alert-danger hidden"></div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
          Masuk →
        </button>
      </form>
      <p style="text-align:center;margin-top:20px;font-size:12px;color:var(--gray-400)">
        SINTA v2.0 &nbsp;·&nbsp; Divisi IT
      </p>
    </div>
  </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
